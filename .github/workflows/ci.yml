name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    name: ${{ matrix.os }} / Node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            node: 18
          - os: ubuntu-24.04
            node: 20
          - os: ubuntu-24.04
            node: 22
          - os: ubuntu-24.04
            node: 24
          - os: macos-14
            node: 22
          - os: windows-2022
            node: 22
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - run: npm run check
